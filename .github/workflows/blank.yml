name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # Job 1: Линтер (участник A)
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Lint check
        run: echo "Lint passed"

  # Job 2: Сборка проекта (участник B)
  build:
    runs-on: ubuntu-latest
    needs: lint            # запускается только после успешного lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build project
        run: echo "Build complete"

  # Job 3: Проверка README (участник C)
  check-readme:
    runs-on: ubuntu-latest
    needs: build           # можно убрать, если хочешь параллельно
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check README for keyword 'project'
        run: grep "project" README.md

  # Job 4: (опционально) уведомление или заглушка под Dependabot
  # Сам Dependabot настраивается отдельно в dependabot.yml
